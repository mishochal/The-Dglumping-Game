<main>
  <h1 class="title">Sign Up</h1>
  <form>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="username" name="username" id="username" class="input-field">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" name="email" id="email" class="input-field">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" name="password" id="password" class="input-field">
    </div>
    <div class="form-group">
      <label for="confirm-password">Confirm Password</label>
      <input type="confirm-password" name="confirm-password" id="confirm-password" class="input-field">
    </div>
    <a routerLink="/sign-in" class="redirect-link">Already have an account? Sign in.</a>
    <button class="submit-btn">Sign Up</button>
  </form>
</main>
